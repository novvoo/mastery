name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release source
        shell: bash
        run: |
          git fetch origin main
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Manual releases must be started from main."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            git merge-base --is-ancestor "${{ github.sha }}" origin/main || {
              echo "Release tags must point to a commit already contained in origin/main."
              exit 1
            }
          fi

  package:
    needs: validate-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            package_ext: deb
          - os: macos-latest
            platform: darwin
            package_ext: pkg
          - os: windows-latest
            platform: win32
            package_ext: msi
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          no-cache: true

      - name: Install production dependencies
        run: bun install --frozen-lockfile --production

      - name: Prepare release package
        run: bun run package:release
        env:
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_STANDALONE: bun

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(bun -e "const pkg = await import('./package.json'); console.log(pkg.default.version)")"
          NAME="$(bun -e "const pkg = await import('./package.json'); console.log(pkg.default.name)")"
          ARCH="$(bun -e "console.log(process.arch)")"
          PACKAGE_NAME="${NAME}-${VERSION}-${{ matrix.platform }}-${ARCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create Debian package
        if: matrix.package_ext == 'deb'
        shell: bash
        run: |
          set -euo pipefail

          NAME="${{ steps.meta.outputs.name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ARCH="${{ steps.meta.outputs.arch }}"
          DEB_ARCH="amd64"
          if [ "$ARCH" = "arm64" ]; then
            DEB_ARCH="arm64"
          fi

          PACKAGE_ROOT="dist/deb-root"
          INSTALL_ROOT="$PACKAGE_ROOT/usr/lib/$NAME"
          BIN_ROOT="$PACKAGE_ROOT/usr/bin"

          rm -rf "$PACKAGE_ROOT"
          mkdir -p "$INSTALL_ROOT" "$BIN_ROOT" "$PACKAGE_ROOT/DEBIAN"
          cp -a "dist/${{ steps.meta.outputs.package_name }}/." "$INSTALL_ROOT/"

          cat > "$BIN_ROOT/agent" <<EOF
          #!/usr/bin/env sh
          set -e
          exec "/usr/lib/$NAME/bin/agent" "\$@"
          EOF
          chmod 755 "$BIN_ROOT/agent"

          cat > "$PACKAGE_ROOT/DEBIAN/control" <<EOF
          Package: $NAME
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: $DEB_ARCH
          Maintainer: novvoo
          Description: AI Engineering Mastery Agent CLI
           Standalone ReAct agent CLI with coding skills and tool orchestration.
          EOF

          dpkg-deb --build "$PACKAGE_ROOT" "dist/${{ steps.meta.outputs.package_name }}.deb"

      - name: Create macOS package
        if: matrix.package_ext == 'pkg'
        shell: bash
        run: |
          set -euo pipefail

          NAME="${{ steps.meta.outputs.name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          SCRIPTS_DIR="dist/pkg-scripts"
          mkdir -p "$SCRIPTS_DIR"

          cat > "$SCRIPTS_DIR/preinstall" <<EOF
          #!/bin/sh
          set -e
          rm -rf "/usr/local/lib/$NAME"
          exit 0
          EOF
          chmod 755 "$SCRIPTS_DIR/preinstall"

          cat > "$SCRIPTS_DIR/postinstall" <<EOF
          #!/bin/sh
          set -e
          mkdir -p /usr/local/bin
          cat > /usr/local/bin/agent <<'WRAPPER'
          #!/bin/sh
          exec "/usr/local/lib/$NAME/bin/agent" "\$@"
          WRAPPER
          chmod 755 /usr/local/bin/agent
          exit 0
          EOF
          chmod 755 "$SCRIPTS_DIR/postinstall"

          pkgbuild \
            --root "dist/${{ steps.meta.outputs.package_name }}" \
            --install-location "/usr/local/lib/$NAME" \
            --scripts "$SCRIPTS_DIR" \
            --identifier "com.novvoo.$NAME" \
            --version "$VERSION" \
            "dist/${{ steps.meta.outputs.package_name }}.pkg"

      - name: Install WiX
        if: matrix.package_ext == 'msi'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create Windows MSI package
        if: matrix.package_ext == 'msi'
        shell: pwsh
        run: |
          bun scripts/create-wix-manifest.mjs "dist/${{ steps.meta.outputs.package_name }}" "dist/${{ steps.meta.outputs.package_name }}.wxs"
          wix build "dist/${{ steps.meta.outputs.package_name }}.wxs" -o "dist/${{ steps.meta.outputs.package_name }}.msi"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_name }}
          path: dist/${{ steps.meta.outputs.package_name }}.${{ matrix.package_ext }}
          if-no-files-found: error

  desktop-package:
    needs: validate-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install macOS DMG helper
        if: matrix.target == 'mac'
        run: npm install --no-save --package-lock=false --ignore-scripts dmg-license@1.0.11

      - name: Build desktop package
        shell: bash
        run: node scripts/build-desktop.js --${{ matrix.target }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            release/desktop/**/*.dmg
            release/desktop/**/*.zip
            release/desktop/**/*.exe
            release/desktop/**/*.AppImage
            release/desktop/**/*.deb
            release/desktop/**/*.rpm
            release/desktop/**/*.snap
            release/desktop/**/*.tar.gz
            release/desktop/**/*.yml
            release/desktop/**/*.blockmap
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - package
      - desktop-package
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
