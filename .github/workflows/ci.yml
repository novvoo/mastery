name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test-integration.mjs
