name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "20"

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Quality gate
        run: bun run verify:quality

      - name: Verify public API
        run: bun -e "import('./src/index.js').then(m => console.log('exports:', Object.keys(m).sort().join(', ')))"

      - name: Verify package contents
        run: npm pack --dry-run

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: OMP adapter and unit tests
        run: bun run test:unit

      - name: Desktop IPC tests
        run: bun run test:desktop

  package-smoke:
    name: Desktop Package Smoke Test
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Prepare source package
        run: bun run release:prepare
        env:
          RELEASE_PLATFORM: linux
          SKIP_NODE_MODULES: "1"

      - name: Verify release metadata
        run: test -n "$(find dist -name RELEASE.json -print -quit)"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: always()
    steps:
      - name: Report status
        shell: bash
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Tests:   ${{ needs.test.result }}"
          test "${{ needs.quality.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
