<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" aria-labelledby="title desc" role="img" viewBox="0 0 1200 620"><title id="title">AI Engineering Mastery Agent workflow</title><desc id="desc">A workflow diagram showing methodology, tool routing, execution, verification, and delivery.</desc><defs><style>.bg{fill:#0f141c}.panel{fill:#151b24;stroke:#2d3748;stroke-width:1.4}.panel-soft{fill:#111827;stroke:#314155;stroke-width:1.2}.title{fill:#e5edf7;font:700 26px Inter,Arial,sans-serif}.subtitle{fill:#9aa7b6;font:400 15px Inter,Arial,sans-serif}.label{fill:#f3f7fb;font:700 16px Inter,Arial,sans-serif}.body{fill:#a8b3c1;font:400 13px Inter,Arial,sans-serif}.chip{fill:#1f2937;stroke:#3b4a5f;stroke-width:1}.chip-text{fill:#cbd5e1;font:600 12px Inter,Arial,sans-serif}.accent-blue{fill:#2dd4bf}.accent-cyan{fill:#38bdf8}.accent-green{fill:#86efac}.accent-yellow{fill:#facc15}.accent-red{fill:#fb7185}.arrow{stroke:#62748a;stroke-width:2.2;fill:none;marker-end:url(#arrowhead)}</style><marker id="arrowhead" markerHeight="10" markerWidth="10" orient="auto" refX="8.5" refY="5"><path fill="#62748a" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="1200" height="620" class="bg" rx="22"/><text x="60" y="64" class="title">Methodology-driven AI engineering agent</text><text x="60" y="92" class="subtitle">不是只补全代码，而是把需求对齐、工具选择、代码执行和证据验证放进同一条工程闭环。</text><rect width="205" height="155" x="60" y="132" class="panel" rx="14"/><circle cx="92" cy="166" r="11" class="accent-yellow"/><text x="112" y="171" class="label">1. 对齐与看全局</text><text x="84" y="205" class="body">coverage_check / ask_user: 缺口判断</text><text x="84" y="229" class="body">grill / zoom_out: 对齐与影响面</text><text x="84" y="253" class="body">brainstorm: 多方案与取舍</text><rect width="205" height="155" x="314" y="132" class="panel" rx="14"/><circle cx="346" cy="166" r="11" class="accent-cyan"/><text x="366" y="171" class="label">2. 诊断与计划</text><text x="338" y="205" class="body">diagnose: 症状、日志、假设排序</text><text x="338" y="229" class="body">architect: 架构风险与边界</text><text x="338" y="253" class="body">to_prd / to_issues: 拆任务</text><rect width="205" height="155" x="568" y="132" class="panel" rx="14"/><circle cx="600" cy="166" r="11" class="accent-blue"/><text x="620" y="171" class="label">3. 工具路由</text><text x="592" y="205" class="body">按任务选择必要工具</text><text x="592" y="229" class="body">文件、Shell、PTY、Git</text><text x="592" y="253" class="body">RAG、语义搜索、MCP、Web</text><rect width="205" height="155" x="822" y="132" class="panel" rx="14"/><circle cx="854" cy="166" r="11" class="accent-green"/><text x="874" y="171" class="label">4. 执行与观察</text><text x="846" y="205" class="body">读代码、改文件、运行命令</text><text x="846" y="229" class="body">Desktop 独立执行过程</text><text x="846" y="253" class="body">状态进度条 + 可展开事件</text><path d="M 265 210 L 306 210" class="arrow"/><path d="M 519 210 L 560 210" class="arrow"/><path d="M 773 210 L 814 210" class="arrow"/><rect width="260" height="145" x="210" y="365" class="panel-soft" rx="14"/><circle cx="242" cy="399" r="11" class="accent-red"/><text x="262" y="404" class="label">5. 审查与验证</text><text x="238" y="438" class="body">review: 严重程度、正确性、安全、性能</text><text x="238" y="462" class="body">verify: 用测试、构建、日志证明结果</text><text x="238" y="486" class="body">缺少证据时标出风险和下一步</text><rect width="260" height="145" x="550" y="365" class="panel-soft" rx="14"/><circle cx="582" cy="399" r="11" class="accent-green"/><text x="602" y="404" class="label">6. 交付与记忆</text><text x="578" y="438" class="body">handoff: 变更、验证、风险摘要</text><text x="578" y="462" class="body">项目隔离的文档索引和历史会话</text><text x="578" y="486" class="body">CLI 与 Desktop 共享 RAG 能力</text><path d="M 925 287 C 925 338 795 342 795 390" class="arrow"/><path d="M 470 438 L 542 438" class="arrow"/><path d="M 680 365 C 680 330 120 330 120 287" class="arrow"/><rect width="1080" height="42" x="60" y="540" class="chip" rx="10"/><text x="86" y="566" class="chip-text">安全边界：工作区路径策略 / 敏感路径限制 / Shell 沙箱 / 工具安全检查 / 上下文预算裁剪</text></svg>